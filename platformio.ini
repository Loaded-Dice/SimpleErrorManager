; PlatformIO Project Configuration File
;
; This repository is an ErrorManager library. The configuration below builds
; one of the bundled examples so the library can be developed and tested in
; place. It is NOT needed when you consume the library via lib_deps in your
; own project.
;
; Switch the example that gets built by changing `src_dir` below.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = examples/Basic

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
; Make the library header (src/ErrorManager.h) available to the example.
build_flags = -I src
